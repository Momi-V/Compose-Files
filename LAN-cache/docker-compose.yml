services:
  dns:
    env_file: /mnt/bigSpin/net/Games/LAN-cache/.env
    image: lancachenet/lancache-dns:latest
    networks:
      myvlan:
        ipv4_address: 10.11.1.17
    ports:
      - 53:53/udp
      - 53:53/tcp
    restart: unless-stopped
  monolithic:
    env_file: /mnt/bigSpin/net/Games/LAN-cache/.env
    image: lancachenet/monolithic:latest
    networks:
      myvlan:
        ipv4_address: 10.11.1.18
    ports:
      - 80:80/tcp
      - 443:443/tcp
    restart: unless-stopped
    volumes:
      - /mnt/bigSpin/net/Games/LAN-cache/cache:/data/cache
      - /mnt/bigSpin/net/Games/LAN-cache/logs:/data/logs

networks:
  myvlan:
    driver: macvlan
    driver_opts:
      parent: br0
    ipam:
      config:
        - gateway: 10.11.1.1
          ip_range: 10.11.1.16/28
          subnet: 10.11.1.0/24
